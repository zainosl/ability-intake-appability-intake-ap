services:
  - type: web
    name: ability-intake-app
    env: docker
    plan: starter
    autoDeploy: false
    disk:
      name: ability-intake-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PORT
        value: 8787
      - key: HOST
        value: 0.0.0.0
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
