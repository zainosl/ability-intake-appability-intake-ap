<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>张麓 - 商业方向偏好与约束结果</title>
  <link rel="icon" href="data:image/gif;base64,R0lGODlhAQABAAAAACw=">
  <style>
    :root {
      --bg: #0b0d0f;
      --panel: #111418;
      --panel-2: #171b20;
      --ink: #f7f8fa;
      --muted: #a9b0ba;
      --dim: #69727d;
      --line: rgba(255, 255, 255, 0.1);
      --green: #58e1c1;
      --green-soft: rgba(88, 225, 193, 0.1);
      --gold: #e4c35a;
      --shadow: 0 24px 90px rgba(0, 0, 0, 0.34);
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(rgba(88, 225, 193, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88, 225, 193, 0.025) 1px, transparent 1px),
        var(--bg);
      background-size: 48px 48px;
    }

    main {
      width: min(1380px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 34px 0 64px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0;
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 6px 0 8px;
      font-size: clamp(30px, 4vw, 52px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .topbar p:last-child {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    a, button {
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.045);
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    a:hover, button:hover {
      border-color: rgba(88, 225, 193, 0.42);
      background: var(--green-soft);
      color: var(--green);
    }

    .meta-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(17, 20, 24, 0.82);
    }

    .metric span,
    .metric strong {
      display: block;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      margin-top: 5px;
      color: var(--green);
      font-size: 20px;
    }

    .hero {
      margin-bottom: 16px;
      padding: 20px;
      border: 1px solid rgba(88, 225, 193, 0.24);
      border-radius: var(--radius);
      background: rgba(88, 225, 193, 0.08);
      box-shadow: var(--shadow);
    }

    .hero h2 {
      margin: 5px 0 8px;
      font-size: 24px;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .signal-list {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 0 0 16px;
      padding: 0;
    }

    .signal-list li {
      list-style: none;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(17, 20, 24, 0.82);
    }

    .signal-list b,
    .signal-list span {
      display: block;
    }

    .signal-list b {
      margin-bottom: 6px;
      color: var(--green);
    }

    .signal-list span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .matrix {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(17, 20, 24, 0.86);
      box-shadow: var(--shadow);
    }

    .card h3 {
      margin: 0 0 12px;
      color: var(--green);
      font-size: 18px;
    }

    .field {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .field:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .field b {
      display: inline-flex;
      margin-bottom: 6px;
      padding: 2px 7px;
      border-radius: 5px;
      color: var(--green);
      background: var(--green-soft);
      font-size: 12px;
    }

    .field p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .empty,
    .status {
      color: var(--dim);
    }

    .raw {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(17, 20, 24, 0.72);
    }

    .raw summary {
      padding: 13px 15px;
      color: var(--green);
      cursor: pointer;
      font-weight: 800;
    }

    pre {
      max-height: 420px;
      margin: 0;
      padding: 15px;
      overflow: auto;
      border-top: 1px solid var(--line);
      color: var(--muted);
      white-space: pre-wrap;
      line-height: 1.65;
    }

    @media (max-width: 980px) {
      main { width: min(100vw - 24px, 760px); padding-top: 20px; }
      .topbar { display: block; }
      .actions { justify-content: flex-start; margin-top: 14px; }
      .meta-strip,
      .signal-list,
      .matrix { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section class="topbar">
      <div>
        <p class="eyebrow">张麓 · 第二步输入</p>
        <h1>商业方向偏好与约束结果</h1>
        <p>这里展示用户提交后的最新可视化结果。顾问工作台保持轻量，完整内容集中在这个页面查看。</p>
      </div>
      <div class="actions">
        <a href="/static/deliverables/zhanglu-business-preference-constraints.html">打开填写表</a>
        <button id="copyBtn" type="button">复制 Markdown</button>
      </div>
    </section>

    <section class="meta-strip">
      <div class="metric"><span>提交状态</span><strong id="statusText">读取中</strong></div>
      <div class="metric"><span>填写维度</span><strong id="filledText">-</strong></div>
      <div class="metric"><span>最新提交</span><strong id="timeText">-</strong></div>
    </section>

    <section class="hero">
      <p class="eyebrow">一句话画像</p>
      <h2>轻验证、低压力、产品化优先</h2>
      <p>先从现实边界和偏好约束看第二步商业切口：哪些方向可以轻量测试，哪些方向一开始就不适合做重。</p>
    </section>

    <ul class="signal-list" id="signalList"></ul>
    <section class="matrix" id="matrix"></section>

    <details class="raw">
      <summary>查看原始 Markdown</summary>
      <pre id="rawMarkdown">读取中...</pre>
    </details>
  </main>

  <script>
    const DELIVERABLE_ID = "zhanglu-business-preference-constraints";
    let latestMarkdown = "";

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("zh-CN", { hour12: false });
    }

    function parseMarkdown(markdown) {
      const lines = String(markdown || "").split(/\r?\n/).filter((line) => line.trim().startsWith("|"));
      if (lines.length < 4) return [];
      const splitRow = (line) => line
        .trim()
        .replace(/^\|/, "")
        .replace(/\|$/, "")
        .split("|")
        .map((cell) => cell.trim());
      const header = splitRow(lines[0]).slice(1);
      const pref = splitRow(lines.find((line) => line.includes("| 偏好 |")) || "").slice(1);
      const cons = splitRow(lines.find((line) => line.includes("| 约束 |")) || "").slice(1);
      return header.map((title, index) => ({
        title,
        preference: pref[index] || "未填写",
        constraint: cons[index] || "未填写",
      }));
    }

    function compact(text, max = 140) {
      const clean = String(text || "").replace(/\s+/g, " ").trim();
      if (!clean || clean === "未填写") return "未填写";
      return clean.length > max ? `${clean.slice(0, max)}...` : clean;
    }

    function render(data) {
      const item = data.submissions?.[0];
      if (!item) {
        document.getElementById("statusText").textContent = "暂无提交";
        document.getElementById("rawMarkdown").textContent = "还没有收到用户提交。";
        return;
      }
      latestMarkdown = item.markdown || "";
      const rows = parseMarkdown(latestMarkdown);
      const filled = rows.filter((row) => row.preference !== "未填写" || row.constraint !== "未填写");
      document.getElementById("statusText").textContent = "已提交";
      document.getElementById("filledText").textContent = `${filled.length}/${rows.length}`;
      document.getElementById("timeText").textContent = formatDate(item.created_at);
      document.getElementById("rawMarkdown").textContent = latestMarkdown;

      document.getElementById("signalList").innerHTML = rows
        .filter((row) => row.preference !== "未填写")
        .slice(0, 4)
        .map((row) => `<li><b>${escapeHtml(row.title)}</b><span>${escapeHtml(compact(row.preference, 115))}</span></li>`)
        .join("") || `<li><span class="empty">还没有可展示的偏好信号。</span></li>`;

      document.getElementById("matrix").innerHTML = rows.map((row) => `
        <article class="card">
          <h3>${escapeHtml(row.title)}</h3>
          <div class="field"><b>偏好</b><p>${escapeHtml(row.preference)}</p></div>
          <div class="field"><b>约束</b><p>${escapeHtml(row.constraint)}</p></div>
        </article>
      `).join("");
    }

    async function load() {
      try {
        const response = await fetch(`/api/deliverable-submissions?deliverable_id=${DELIVERABLE_ID}&limit=1`);
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || `读取失败：${response.status}`);
        render(data);
      } catch (error) {
        document.getElementById("statusText").textContent = "读取失败";
        document.getElementById("rawMarkdown").textContent = error.message;
      }
    }

    async function copyMarkdown() {
      if (!latestMarkdown) return;
      try {
        await navigator.clipboard.writeText(latestMarkdown);
        document.getElementById("copyBtn").textContent = "已复制";
        setTimeout(() => document.getElementById("copyBtn").textContent = "复制 Markdown", 1200);
      } catch (_) {
        const textarea = document.createElement("textarea");
        textarea.value = latestMarkdown;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }
    }

    document.getElementById("copyBtn").addEventListener("click", copyMarkdown);
    load();
  </script>
</body>
</html>
